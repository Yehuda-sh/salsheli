name: Firebase App Distribution
on:
  push:
    branches:
      - '**'

# רק build אחד בו-זמנית לכל branch — ממתין לסיום הקודם (לא מבטל)
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # 🔍 Detect if models changed — skip build_runner if not needed
      - name: Detect changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          if echo "$CHANGED" | grep -qE 'lib/models/.*\.dart$|pubspec\.(yaml|lock)'; then
            echo "needs_codegen=true" >> $GITHUB_OUTPUT
            echo "🔨 Model files changed — will run build_runner"
          else
            echo "needs_codegen=false" >> $GITHUB_OUTPUT
            echo "⏭️ No model changes — will skip build_runner"
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 🚀 Cache pub dependencies
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool/
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: Install dependencies
        run: flutter pub get

      # 🚀 Run build_runner only when models changed (.g.dart files are in git)
      - name: Generate code
        if: steps.changes.outputs.needs_codegen == 'true'
        run: |
          dart run build_runner build --delete-conflicting-outputs
          echo "✅ Code generation complete"

      # 🚀 Cache Gradle (biggest time saver — saves ~2-3 minutes)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ hashFiles('android/build.gradle', 'android/app/build.gradle', 'pubspec.lock') }}
          restore-keys: gradle-

      - name: Build APK
        run: flutter build apk --release

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-release.apk
