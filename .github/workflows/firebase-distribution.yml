name: Firebase App Distribution
on:
  push:
    branches:
      - '**'

# רק build אחד בו-זמנית לכל branch — ממתין לסיום הקודם (לא מבטל)
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # needed to detect changed files

      # 🔍 Detect what changed — skip unnecessary steps
      - name: Detect changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Check if models/serializable files changed (need build_runner)
          if echo "$CHANGED" | grep -qE '\.(g\.dart|freezed\.dart)$|lib/models/|pubspec\.(yaml|lock)'; then
            echo "needs_codegen=true" >> $GITHUB_OUTPUT
          else
            echo "needs_codegen=false" >> $GITHUB_OUTPUT
          fi

          # Check if dependencies changed
          if echo "$CHANGED" | grep -q 'pubspec'; then
            echo "deps_changed=true" >> $GITHUB_OUTPUT
          else
            echo "deps_changed=false" >> $GITHUB_OUTPUT
          fi

          echo "🔍 needs_codegen=${{ steps.changes.outputs.needs_codegen || 'detecting...' }}"
          echo "🔍 deps_changed=${{ steps.changes.outputs.deps_changed || 'detecting...' }}"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 🚀 Cache pub dependencies
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool/
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: Install dependencies
        run: flutter pub get

      # 🚀 Cache build_runner output
      - name: Cache build_runner
        if: steps.changes.outputs.needs_codegen == 'true'
        uses: actions/cache@v4
        with:
          path: .dart_tool/build
          key: build-runner-${{ hashFiles('lib/models/**') }}
          restore-keys: build-runner-

      - name: Generate code
        if: steps.changes.outputs.needs_codegen == 'true'
        run: |
          echo "🔨 Models changed — running build_runner..."
          dart run build_runner build --delete-conflicting-outputs

      - name: Skip codegen
        if: steps.changes.outputs.needs_codegen == 'false'
        run: echo "⏭️ No model changes — skipping build_runner (saving ~60s)"

      # 🚀 Cache Gradle (biggest time saver — saves ~2-3 minutes)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ hashFiles('android/build.gradle', 'android/app/build.gradle', 'pubspec.lock') }}
          restore-keys: gradle-

      - name: Build APK
        run: flutter build apk --release

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-release.apk
