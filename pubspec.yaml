# 📝 MemoZap — Smart Family Shopping Lists
name: memozap
description: "MemoZap - Smart family shopping list manager with Notebook design, shared lists, digital pantry and receipt scanning."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  dynamic_color: ^1.7.0
  skeletonizer: ^1.3.0  # Premium skeleton loading effects
  gap: ^3.0.1  # Clean spacing management
  badges: ^3.1.2  # Notification bubbles for BottomNav & AppBar

  # State & Storage
  provider: ^6.1.2
  shared_preferences: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Network
  http: ^1.2.2
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.0.3

  # Utils
  intl: ^0.20.2
  json_annotation: ^4.9.0
  timeago: ^3.7.0
  xml: ^6.6.1
  archive: ^4.0.7
  uuid: ^4.5.0
  rxdart: ^0.28.0  # Stream utilities for Collaborative Sync

  # Media
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  mobile_scanner: ^7.1.2

  # Contacts
  flutter_contacts: ^1.1.9+2

  # Files
  path_provider: ^2.1.4
  path: ^1.9.0

  # Charts
  fl_chart: ^1.1.0

  # Tutorial / Onboarding
  tutorial_coach_mark: ^1.2.11

  # Firebase
  firebase_core: ^4.2.0
  cloud_firestore: ^6.0.3
  firebase_auth: ^6.1.1
  firebase_storage: ^13.0.3
  firebase_analytics: ^12.1.0
  firebase_crashlytics: ^5.0.6
  firebase_messaging: ^16.1.0  # Real-time Push Notifications

  # Social Login
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.3
  crypto: ^3.0.6

  # App Branding
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.14.3
  wakelock_plus: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1  # Adapter generation for Pantry models
  mockito: ^5.4.4
  test: ^1.25.0
  fake_cloud_firestore: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/list_types/
    - assets/templates/
    - assets/images/
    - assets/icons/

  fonts:
    - family: Assistant
      fonts:
        - asset: assets/fonts/Assistant-Regular.ttf
        - asset: assets/fonts/Assistant-Bold.ttf
          weight: 700
    - family: Caveat
      fonts:
        - asset: assets/fonts/Caveat-Variable.ttf

# ═══════════════════════════════════════════════
# 🎨 App Icon Configuration
# ═══════════════════════════════════════════════
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFF8F0"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"

# ═══════════════════════════════════════════════
# 🌊 Splash Screen Configuration
# ═══════════════════════════════════════════════
flutter_native_splash:
  color: "#FFF8F0"
  image: "assets/images/logo.png"
  color_dark: "#1A1A2E"
  image_dark: "assets/images/logo.png"
  android_12:
    color: "#FFF8F0"
    icon_background_color: "#FFF8F0"
    image: "assets/images/logo.png"
    color_dark: "#1A1A2E"
    icon_background_color_dark: "#1A1A2E"
    image_dark: "assets/images/logo.png"
